openapi: 3.1.0
info:
  title: Quai Terminal DEX API
  version: 0.0.0
  description: API-first non-custodial orderbook DEX for Quai.
servers:
  - url: http://localhost:8787
    description: local development
tags:
  - name: public
  - name: private
  - name: proofs
paths:
  /v1/health:
    get:
      tags: [public]
      summary: Health check
      responses:
        "200":
          description: Service is healthy
  /v1/markets:
    get:
      tags: [public]
      summary: List enabled markets
      responses:
        "200":
          description: Market list
  /v1/tickers:
    get:
      tags: [public]
      summary: List tickers
      responses:
        "200":
          description: Ticker list
  /v1/tickers/{market}:
    get:
      tags: [public]
      summary: Get ticker for a market
      parameters:
        - name: market
          in: path
          required: true
          schema: { type: string, example: QI-QUAI }
      responses:
        "200":
          description: Market ticker
  /v1/orderbook/{market}:
    get:
      tags: [public]
      summary: Get orderbook depth
      parameters:
        - name: market
          in: path
          required: true
          schema: { type: string, example: QI-QUAI }
      responses:
        "200":
          description: Orderbook depth
  /v1/trades/{market}:
    get:
      tags: [public]
      summary: Recent public trades
      parameters:
        - name: market
          in: path
          required: true
          schema: { type: string, example: QI-QUAI }
      responses:
        "200":
          description: Trade list
  /v1/klines/{market}:
    get:
      tags: [public]
      summary: Market candles
      parameters:
        - name: market
          in: path
          required: true
          schema: { type: string, example: QI-QUAI }
        - name: interval
          in: query
          required: false
          schema: { type: string, enum: [1m, 5m, 15m, 1h, 4h, 1d, 1w], default: 15m }
      responses:
        "200":
          description: Candle list
  /v1/fees:
    get:
      tags: [public]
      summary: Fee schedule
      responses:
        "200":
          description: Fee table
  /v1/contracts:
    get:
      tags: [public]
      summary: Contract addresses and verification links
      description: No autonomous deployment, transaction, wallet, or external RPC activity is implied by /v1/contracts.
      responses:
        "200":
          description: Contract registry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContractRegistry"
  /v1/listings/policy:
    get:
      tags: [public]
      summary: Read-only token listing and MarketRegistry metadata policy
      description: Token listing policy/status metadata only; no wallet loading, signing, broadcast, RPC URL access, transaction submission, deploy, or real funds are introduced by this route.
      responses:
        "200":
          description: Token listing policy metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenListingPolicy"
  /v1/listings/review-flow:
    get:
      tags: [public]
      summary: Read-only local listing request review and approval flow
      description: Clonners-managed local review metadata only; no wallet loading, signing, broadcast, RPC URL access, transaction submission, deploy, real token addresses, MarketRegistry mutation, or real funds are introduced by this route.
      responses:
        "200":
          description: Local listing review/approval metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListingRequestReviewFlow"
  /v1/listings/requests:
    get:
      tags: [public]
      summary: Inspect local in-memory listing review queue
      description: Read-only inspection of the approved local in-memory listing review queue. It exposes metadata-only local review records and performs no wallet loading, signing, broadcast, RPC URL access, transaction submission, deploy, real token addresses, listing-admin keys, MarketRegistry mutation, or real funds movement.
      responses:
        "200":
          description: Local in-memory listing review queue state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListingRequestQueueResponse"
    post:
      tags: [public]
      summary: Prepare-only listing request approval gate or local review queue intake
      description: "POST /v1/listings/requests is an intentional 501 placeholder and not-implemented approval boundary unless requestMode=local_review_queue is provided. With requestMode=local_review_queue it records metadata only in the in-memory local review queue and returns 202; prepare-only mode still returns the approval-gated placeholder. It performs no wallet loading, signing, broadcast, RPC URL access, transaction submission, deploy, real token addresses, listing-admin runtime behavior, MarketRegistry mutation, or real funds; listing-admin keys are also forbidden."
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ListingRequestPrepare"
      responses:
        "202":
          description: Local review request queued in memory only; no MarketRegistry mutation or funds movement.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListingRequestQueuedResponse"
        "400":
          description: Local review request rejected before queueing because metadata is missing/invalid or live authority fields were supplied.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListingRequestRejectionResponse"
        "501":
          description: Listing request placeholder remains approval-gated and not implemented when requestMode is not local_review_queue
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListingRequestPlaceholderResponse"
  /v1/listings/requests/{requestId}/decision:
    post:
      tags: [public]
      summary: Record a local-only listing review decision
      description: "Records approve/reject metadata only when decisionMode=local_review_decision. This local decision workflow performs no wallet loading, signing, broadcast, RPC URL access, transaction submission, deploy, real token addresses, listing-admin keys, MarketRegistry mutation, or real funds; explicit Clonners approval is still required before MarketRegistry.addMarket."
      parameters:
        - name: requestId
          in: path
          required: true
          schema: { type: string, example: listing-request-000001 }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ListingRequestDecision"
      responses:
        "200":
          description: Local review decision recorded in memory only; no MarketRegistry mutation or funds movement.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListingRequestDecisionResponse"
        "400":
          description: Local review decision rejected because metadata is missing/invalid or live authority fields were supplied.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListingRequestDecisionError"
        "404":
          description: Local review request id was not found in the in-memory queue; no MarketRegistry mutation or funds movement.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListingRequestDecisionError"
        "409":
          description: Local review request already has a metadata-only decision; decisions are immutable and do not mutate MarketRegistry.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListingRequestDecisionError"
  /v1/relayer/settlement-mode-gate:
    get:
      tags: [public]
      summary: Read-only relayer settlement-mode approval gate status
      description: Read-only relayer gate metadata only. Returns mock-mode status and the blocked quai_contract activation gate without wallet loading, signing, broadcast, RPC URL access, or transaction submission.
      responses:
        "200":
          description: Relayer settlement-mode gate status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RelayerSettlementModeGateStatus"
  /v1/auth/challenge:
    post:
      tags: [private]
      summary: Create wallet auth challenge
      responses:
        "200":
          description: Challenge payload to sign
  /v1/auth/session:
    post:
      tags: [private]
      summary: Exchange signed challenge for API session
      responses:
        "200":
          description: Session token
  /v1/account:
    get:
      tags: [private]
      summary: Current account profile
      responses:
        "200":
          description: Account data
  /v1/account/balances:
    get:
      tags: [private]
      summary: Indexed vault balances
      description: "Mock vault projection only: no real Quai transaction, no wallet loaded, no funds moved, and no delegate withdrawal/admin authority."
      responses:
        "200":
          description: Read-only mock vault balance projection
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountBalances"
  /v1/vault/deposits/prepare:
    post:
      tags: [private]
      summary: Prepare owner-wallet TradingVault deposit
      description: owner-wallet-only prepare-only boundary for future TradingVault deposits; performs no wallet loading, signing, broadcast, RPC URL access, transaction submission, deploy, or funds movement.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VaultOperationPrepareRequest"
      responses:
        "501":
          description: Deposit preparation is documented but not wired to owner-wallet signing, broadcast, or TradingVault mutation.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VaultOperationPrepareNotImplemented"
  /v1/vault/withdrawals/prepare:
    post:
      tags: [private]
      summary: Prepare owner-wallet TradingVault withdrawal
      description: owner-wallet-only prepare-only boundary for future TradingVault withdrawals; performs no wallet loading, signing, broadcast, RPC URL access, transaction submission, deploy, or funds movement.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VaultOperationPrepareRequest"
      responses:
        "501":
          description: Withdrawal preparation is documented but not wired to owner-wallet signing, broadcast, or TradingVault mutation.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VaultOperationPrepareNotImplemented"
  /v1/orders:
    get:
      tags: [private]
      summary: List user orders
      responses:
        "200":
          description: Order list
    post:
      tags: [private]
      summary: Submit signed order
      description: POST /v1/orders accepts SignedOrder-like payloads. Market orders must be modeled as IOC limit orders with slippage bounds.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderRequest"
      responses:
        "201":
          description: Order accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderAccepted"
  /v1/orders/{orderHash}:
    delete:
      tags: [private]
      summary: Cancel order
      description: Cancels matcher-open quantity only. This mock cancellation does not cancel on-chain NonceManager nonces or grant withdrawal authority.
      parameters:
        - name: orderHash
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Matcher-local cancel request accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CancellationResult"
        "404":
          description: Order hash not found in the mock matcher; no on-chain nonce state changes.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CancellationError"
        "409":
          description: Order has no matcher-open quantity to cancel; no on-chain nonce state changes.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CancellationError"
  /v1/orders/cancel-all:
    post:
      tags: [private]
      summary: Cancel all orders for user/market
      description: Cancels matcher-open quantity only for optional marketId/owner filters. This mock cancellation does not cancel on-chain NonceManager nonces or grant withdrawal authority.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                marketId:
                  type: string
                  example: QI-QUAI
                owner:
                  type: string
                  description: Optional owner-wallet filter; does not grant withdrawal authority.
      responses:
        "200":
          description: Matcher-local cancel-all accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CancellationResult"
  /v1/nonces/cancel:
    post:
      tags: [private]
      summary: Prepare owner-signed NonceManager cancellation
      description: Prepare-only 501 placeholder for owner-signed `cancelNonce`/`cancelNonceRange`; Matcher-local cancellation does not mutate on-chain NonceManager nonces, and this endpoint performs no wallet loading, transaction signing, RPC broadcast, or relayer submission.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OwnerSignedNonceCancelRequest"
      responses:
        "501":
          description: Owner-signed nonce cancellation is documented but not wired to signing, broadcast, or relayer submission.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OwnerSignedNonceCancelNotImplemented"
  /v1/fills:
    get:
      tags: [private]
      summary: User indexed fills from confirmed settlement projections
      responses:
        "200":
          description: Adapter-shaped fill projection list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FillListResponse"
  /v1/delegate-keys:
    get:
      tags: [private]
      summary: List delegate/API keys
      responses:
        "200":
          description: Delegate key list
    post:
      tags: [private]
      summary: Create delegate/API key
      description: Delegate keys default to NO_WITHDRAW.
      responses:
        "201":
          description: Delegate key created
  /v1/delegate-keys/{keyId}:
    delete:
      tags: [private]
      summary: Revoke delegate/API key
      parameters:
        - name: keyId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Delegate key revoked
  /v1/proofs/trades/{tradeId}:
    get:
      tags: [proofs]
      summary: Get on-chain proof for a trade
      parameters:
        - name: tradeId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Trade proof
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TradeProofResponse"
        "404":
          description: Indexed proof not found yet
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TradeProofNotFound"
components:
  schemas:
    AccountBalances:
      type: object
      description: Read-only mock vault balance projection; API state is projection/cache, not custody authority.
      required: [balances, source, custody, permissions, withdrawalAuthority, settlementMode, realQuaiTransactions, walletRequired, safetyNotice]
      properties:
        balances:
          type: array
          items:
            type: object
        source:
          type: string
          enum: [mock-vault-projection]
        custody:
          type: string
          enum: [non-custodial-contract-vault]
        permissions:
          type: array
          items:
            type: string
            enum: [READ_ONLY, NO_WITHDRAW, NO_ADMIN]
        withdrawalAuthority:
          type: string
          enum: [owner-wallet-only]
        settlementMode:
          type: string
          enum: [mock]
        realQuaiTransactions:
          type: boolean
          enum: [false]
        walletRequired:
          type: boolean
          enum: [false]
        safetyNotice:
          type: string
          description: Mock vault projection only; no real Quai transaction, no wallet loaded, no funds moved, and no delegate withdrawal/admin authority.
    TradingVaultDepositProjection:
      type: object
      description: Read-only TradingVault Deposit event projection. Mock rows set settlementTx, blockNumber, blockHash, eventIndex, and explorerUrl to null; real Quai rows require settlementTx, blockNumber, blockHash, eventIndex, and explorerUrl. Projection rows are read-only event truth with no wallet loaded, no funds moved, and no delegate withdrawal/admin authority.
      required: [projectionType, sourceEventId, eventName, owner, token, amount, settlementMode, settlementTx, blockNumber, blockHash, eventIndex, explorerUrl, permissions, custody, realQuaiTransactions, walletRequired, fundsMoved, tradingVaultMutation, safetyNotice]
      properties:
        projectionType:
          type: string
          enum: [TradingVaultDepositProjection]
        sourceEventId:
          type: string
          description: Normalized indexer event id for the source Deposit event.
        eventName:
          type: string
          enum: [Deposit]
        owner:
          type: string
        token:
          type: string
        amount:
          type: string
        settlementMode:
          type: string
          enum: [mock, quai_contract]
        settlementTx:
          type: string
          nullable: true
        blockNumber:
          type: integer
          nullable: true
        blockHash:
          type: string
          nullable: true
        eventIndex:
          type: integer
          nullable: true
        explorerUrl:
          type: string
          nullable: true
        permissions:
          type: array
          items:
            type: string
            enum: [READ_ONLY, NO_WITHDRAW, NO_ADMIN]
        custody:
          type: string
          enum: [non-custodial-contract-vault]
        realQuaiTransactions:
          type: boolean
          enum: [false]
        walletRequired:
          type: boolean
          enum: [false]
        fundsMoved:
          type: boolean
          enum: [false]
        tradingVaultMutation:
          type: boolean
          enum: [false]
        safetyNotice:
          type: string
          description: Deposit projection is read-only; mock rows set settlementTx, blockNumber, blockHash, eventIndex, and explorerUrl to null, and real Quai rows require settlementTx, blockNumber, blockHash, eventIndex, and explorerUrl before confirmed history display.
    TradingVaultWithdrawalProjection:
      type: object
      description: Read-only TradingVault Withdraw event projection. Mock rows set settlementTx, blockNumber, blockHash, eventIndex, and explorerUrl to null; real Quai rows require settlementTx, blockNumber, blockHash, eventIndex, and explorerUrl. Projection rows are read-only event truth with no wallet loaded, no funds moved, and no delegate withdrawal/admin authority.
      required: [projectionType, sourceEventId, eventName, owner, token, amount, settlementMode, settlementTx, blockNumber, blockHash, eventIndex, explorerUrl, permissions, custody, realQuaiTransactions, walletRequired, fundsMoved, tradingVaultMutation, safetyNotice]
      properties:
        projectionType:
          type: string
          enum: [TradingVaultWithdrawalProjection]
        sourceEventId:
          type: string
          description: Normalized indexer event id for the source Withdraw event.
        eventName:
          type: string
          enum: [Withdraw]
        owner:
          type: string
        token:
          type: string
        amount:
          type: string
        settlementMode:
          type: string
          enum: [mock, quai_contract]
        settlementTx:
          type: string
          nullable: true
        blockNumber:
          type: integer
          nullable: true
        blockHash:
          type: string
          nullable: true
        eventIndex:
          type: integer
          nullable: true
        explorerUrl:
          type: string
          nullable: true
        permissions:
          type: array
          items:
            type: string
            enum: [READ_ONLY, NO_WITHDRAW, NO_ADMIN]
        custody:
          type: string
          enum: [non-custodial-contract-vault]
        realQuaiTransactions:
          type: boolean
          enum: [false]
        walletRequired:
          type: boolean
          enum: [false]
        fundsMoved:
          type: boolean
          enum: [false]
        tradingVaultMutation:
          type: boolean
          enum: [false]
        safetyNotice:
          type: string
          description: Withdrawal projection is read-only; mock rows set settlementTx, blockNumber, blockHash, eventIndex, and explorerUrl to null, and real Quai rows require settlementTx, blockNumber, blockHash, eventIndex, and explorerUrl before confirmed history display.
    VaultOperationPrepareRequest:
      type: object
      description: owner wallet must authorize the future deposit/withdrawal; local prepare mode carries intent metadata only and no signing/RPC/tx fields.
      required: [operation, owner, assetSymbol, amount, chainId, vaultContractRef]
      properties:
        operation:
          type: string
          enum: [deposit, withdrawal]
        owner:
          type: string
          description: Main owner wallet that must authorize the future deposit/withdrawal; delegate keys cannot perform this flow.
        assetSymbol:
          type: string
          enum: [WQUAI, WQI, community-created-erc20-style-token]
        amount:
          type: string
          description: Decimal amount intent for the future owner-wallet operation; no funds move in prepare mode.
        chainId:
          type: integer
          description: Future replay-domain chain id; local placeholder does not read RPC URLs.
        vaultContractRef:
          type: string
          enum: [local-only-not-deployed]
          description: Local-only TradingVault reference; no real contract address is accepted in this slice.
    VaultOperationPrepareNotImplemented:
      type: object
      description: Prepare-only owner-wallet TradingVault deposit/withdrawal placeholder; no wallet, transaction, or fund movement behavior.
      required: [error, source, custody, vaultOperation, operationStatus, ownerAuthorization, permissions, delegateAuthority, realQuaiTransactions, walletRequired, fundsMoved, tradingVaultMutation, approvalGate, safety, message]
      properties:
        error:
          type: string
          enum: [owner_wallet_vault_deposit_not_implemented, owner_wallet_vault_withdrawal_not_implemented]
        source:
          type: string
          enum: [owner-wallet-vault-operation-placeholder]
        custody:
          type: string
          enum: [non-custodial-contract-vault]
        vaultOperation:
          type: string
          enum: [deposit, withdrawal]
        operationStatus:
          type: string
          enum: [prepare-only-not-implemented]
        ownerAuthorization:
          type: string
          enum: [owner-wallet-required]
        permissions:
          type: array
          items:
            type: string
            enum: [NO_WITHDRAW, NO_ADMIN]
        delegateAuthority:
          type: string
          enum: [delegates-cannot-deposit-or-withdraw]
        realQuaiTransactions:
          type: boolean
          enum: [false]
        walletRequired:
          type: boolean
          enum: [false]
        fundsMoved:
          type: boolean
          enum: [false]
        tradingVaultMutation:
          type: boolean
          enum: [false]
        approvalGate:
          type: string
          enum: [explicit-approval-required-before-wallet-signing-or-quai-broadcast]
        safety:
          type: object
          required: [noWalletLoading, noRpcUrlAccess, noSigning, noBroadcast, noDeploys, noTransactionSubmission, noFundsMovement, noDelegateWithdrawalAuthority, noAdminWithdrawalAuthority, notice]
          properties:
            noWalletLoading:
              type: boolean
              enum: [true]
            noRpcUrlAccess:
              type: boolean
              enum: [true]
            noSigning:
              type: boolean
              enum: [true]
            noBroadcast:
              type: boolean
              enum: [true]
            noDeploys:
              type: boolean
              enum: [true]
            noTransactionSubmission:
              type: boolean
              enum: [true]
            noFundsMovement:
              type: boolean
              enum: [true]
            noDelegateWithdrawalAuthority:
              type: boolean
              enum: [true]
            noAdminWithdrawalAuthority:
              type: boolean
              enum: [true]
            notice:
              type: string
              description: Prepare-only owner-wallet TradingVault boundary with no wallet loading, no signing, no RPC URL access, no transaction submission, and no funds moved.
        message:
          type: string
    ContractRegistry:
      type: object
      description: Contract address and dependency metadata. No autonomous deployment, transaction, wallet, or external RPC activity is implied by /v1/contracts.
      required:
        - chain
        - settlementMode
        - deploymentStatus
        - custody
        - realQuaiTransactions
        - walletRequired
        - assetListingCaveat
        - listedAssetStatus
        - contracts
        - safety
      properties:
        chain:
          type: string
          example: quai-single-zone-mvp
        settlementMode:
          type: string
          enum: [mock, quai_contract]
        deploymentStatus:
          type: string
          enum: [local-only-not-deployed, deployed]
        custody:
          type: string
          enum: [non-custodial-no-withdrawal-authority]
        realQuaiTransactions:
          type: boolean
          description: False for autonomous/local metadata until explicit deployment approval exists.
        walletRequired:
          type: boolean
          description: False for local metadata; real wallet activity requires explicit approval.
        assetListingCaveat:
          type: string
          description: QDEX MVP lists ERC-20-style vault tokens such as WQUAI, WQI, and approved community tokens; native Qi direct settlement is out of scope.
        listedAssetStatus:
          $ref: "#/components/schemas/ListedAssetStatus"
        docs:
          type: array
          items: { type: string }
        contracts:
          type: object
          required: [tradingVault, settlement, nonceManager, marketRegistry, feeManager, delegateKeyRegistry]
          properties:
            tradingVault:
              $ref: "#/components/schemas/ContractMetadata"
            settlement:
              $ref: "#/components/schemas/ContractMetadata"
            nonceManager:
              $ref: "#/components/schemas/ContractMetadata"
            marketRegistry:
              $ref: "#/components/schemas/ContractMetadata"
            feeManager:
              $ref: "#/components/schemas/ContractMetadata"
            delegateKeyRegistry:
              $ref: "#/components/schemas/ContractMetadata"
        safety:
          $ref: "#/components/schemas/ContractSafety"
    ListedAssetStatus:
      type: object
      description: Read-only listed-asset metadata. The MVP settles listed ERC-20-style vault tokens such as WQUAI, WQI, and approved community tokens; native Qi direct settlement is out of scope.
      required: [status, primaryQuoteAssets, supportedAssetModel, userListedTokens, listingFlowStatus, marketRegistryRole, nativeQiTreatment, nativeQiDirectSettlement, realQuaiTransactions, walletRequired, safetyNotice]
      properties:
        status:
          type: string
          enum: [wrapped-token-listing]
        primaryQuoteAssets:
          type: array
          items:
            type: string
            enum: [WQUAI, WQI]
        supportedAssetModel:
          type: string
          enum: [erc20-style-vault-token]
        userListedTokens:
          type: boolean
          enum: [true]
        listingFlowStatus:
          type: string
          enum: [design-required]
        marketRegistryRole:
          type: string
          example: list approved token pairs after review
        nativeQiTreatment:
          type: string
