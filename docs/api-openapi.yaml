        marketRegistryMutation: { type: boolean, enum: [false] }
        realQuaiTransactions: { type: boolean, enum: [false] }
        walletRequired: { type: boolean, enum: [false] }
        permissions:
          type: array
          items:
            type: string
            enum: [NO_WITHDRAW, NO_ADMIN]
        custody:
          type: string
          example: "non-custodial"
        safety:
          $ref: "#/components/schemas/ListingRequestSafety"
        message:
          type: string
          example: "Rejected local review decision input; no MarketRegistry mutation, signing, broadcast, transaction submission, deploy, or funds movement occurred."
    ListingRequestSafety:
      type: object
      required: [noWalletLoading, noRpcUrlAccess, noSigning, noBroadcast, noDeploys, noTransactionSubmission, noRuntimeListingQueue, noListingAdminKeys, noRealTokenAddresses, noFundsMovement, notice]
      properties:
        noWalletLoading:
          type: boolean
          enum: [true]
        noRpcUrlAccess:
          type: boolean
          enum: [true]
        noSigning:
          type: boolean
          enum: [true]
        noBroadcast:
          type: boolean
          enum: [true]
        noDeploys:
          type: boolean
          enum: [true]
        noTransactionSubmission:
          type: boolean
          enum: [true]
        noRuntimeListingQueue:
          type: boolean
          enum: [true]
        noListingAdminKeys:
          type: boolean
          enum: [true]
        noRealTokenAddresses:
          type: boolean
          enum: [true]
        noFundsMovement:
          type: boolean
          enum: [true]
        notice:
          type: string
          example: "Prepare-only listing request placeholder: no listing request was submitted, no MarketRegistry mutation occurred, and listing/admin metadata cannot move TradingVault balances or grant withdrawal/admin authority."
    ContractMetadata:
      type: object
      required: [key, contractName, address, deploymentStatus, operatorWithdrawalAuthority]
      properties:
        key: { type: string }
        contractName: { type: string }
        interface: { type: string }
        address:
          type: [string, "null"]
          description: Null while local-only and not deployed.
        deploymentStatus:
          type: string
          enum: [local-only-not-deployed, deployed]
        sourcePath: { type: string }
        interfacePath: { type: string }
        custodyRole: { type: string }
        operatorWithdrawalAuthority:
          type: boolean
          description: Must remain false for non-custodial MVP metadata.
        proofTrigger:
          type: string
          enum: [TradeSettled]
        dependencies:
          type: array
          items:
            type: string
            enum: [TradingVault, NonceManager, MarketRegistry, FeeManager, DelegateKeyRegistry]
        nonceTruth:
          type: string
          example: external-nonce-manager
        marketTruth:
          type: string
          example: external-market-registry
        feeTruth:
          type: string
          example: external-fee-manager
        requiredPermissions:
          type: array
          items:
            type: string
            enum: [PLACE_ORDER, NO_WITHDRAW, NO_ADMIN]
    ContractSafety:
      type: object
      required: [nonCustodial, operatorWithdrawalAuthority, realQuaiTransactions, walletRequired, approvalGate, notice]
      properties:
        nonCustodial: { type: boolean }
        operatorWithdrawalAuthority: { type: boolean }
        realQuaiTransactions: { type: boolean }
        walletRequired: { type: boolean }
        approvalGate:
          type: string
          example: explicit-approval-required-before-deploy-or-transaction
        notice:
          type: string
          example: No autonomous deployment, transaction, wallet, or external RPC activity is implied by /v1/contracts.
    RelayerSettlementModeGateStatus:
      type: object
      description: Read-only relayer gate metadata only; no wallet loading, signing, broadcast, RPC URL access, or transaction submission is performed.
      required: [source, currentSettlementMode, supportedSettlementModes, custody, realQuaiTransactions, walletRequired, requiredEventTruthFields, modes, safety]
      properties:
        source:
          type: string
          enum: [relayer-approval-gate]
        currentSettlementMode:
          type: string
          enum: [mock]
        supportedSettlementModes:
          type: array
          items:
            type: string
            enum: [mock, quai_contract]
        custody:
          type: string
          enum: [non-custodial-relayer-gate]
        realQuaiTransactions:
          type: boolean
          enum: [false]
        walletRequired:
          type: boolean
          enum: [false]
        requiredEventTruthFields:
          type: array
          items:
            type: string
            enum: [settlementTx, blockNumber, blockHash, eventIndex, explorerUrl]
        modes:
          type: object
          required: [mock, quai_contract]
          properties:
            mock:
              $ref: "#/components/schemas/RelayerModeGateResult"
            quai_contract:
              $ref: "#/components/schemas/RelayerModeGateResult"
        safety:
          type: object
          required: [approvalRequired, explicitApproval, noWalletLoading, noSigning, noBroadcast, noRpcUrlAccess, noTransactionSubmission, proofTrigger, notice]
          properties:
            approvalRequired: { type: boolean }
            explicitApproval:
              type: string
              example: Clonners approval required before quai_contract activation
            noWalletLoading: { type: boolean, enum: [true] }
            noSigning: { type: boolean, enum: [true] }
            noBroadcast: { type: boolean, enum: [true] }
            noRpcUrlAccess: { type: boolean, enum: [true] }
            noTransactionSubmission: { type: boolean, enum: [true] }
            proofTrigger:
              type: string
              enum: [TradeSettled]
            notice:
              type: string
              example: Read-only relayer gate metadata only; no wallet loading, signing, broadcast, RPC URL access, or transaction submission is performed.
    RelayerModeGateResult:
      type: object
      required: [allowed, reason, settlementMode, realQuaiTransactions, walletRequired, custody, safetyNotice]
      properties:
        allowed: { type: boolean }
        reason:
          type: string
          enum: [mock_mode_local_only, real_quai_approval_gate_blocked, real_quai_approval_gate_ready, unsupported_settlement_mode]
        settlementMode:
          type: string
          enum: [mock, quai_contract]
        missingFields:
          type: array
          items: { type: string }
        requiredEventTruthFields:
          type: array
          items:
            type: string
            enum: [settlementTx, blockNumber, blockHash, eventIndex, explorerUrl]
        realQuaiTransactions:
          type: boolean
          enum: [false]
        walletRequired:
          type: boolean
          enum: [false]
        custody:
          type: string
          enum: [non-custodial-relayer-gate]
        proofTrigger:
          type: string
          enum: [TradeSettled]
        approvalId:
          type: string
        nextAction:
          type: string
        safetyNotice:
          type: string
          example: Real Quai relayer mode requires explicit Clonners approval and complete event-truth inputs; this gate performs no wallet loading, signing, broadcast, RPC URL, or transaction submission.
    OrderSide:
      type: string
      enum: [buy, sell]
    OrderType:
      type: string
      description: market_ioc orders are IOC limit orders with signed slippage/price bounds.
      enum: [limit, market_ioc]
    TimeInForce:
      type: string
      enum: [GTC, IOC, FOK, POST_ONLY]
    OrderSignature:
      type: object
      required: [scheme, signer, value]
      properties:
        scheme:
          type: string
          enum: [mock, typed_data]
          description: MVP supports mock signatures; production should use Quai-compatible typed structured data.
        signer:
          type: string
          description: Owner or approved delegate signer address.
          example: "0x1111111111111111111111111111111111111111"
        value:
          type: string
          description: Signature bytes or mock signature marker.
          example: "0xmock-signature"
        signedAt:
          type: integer
          format: int64
          minimum: 0
    SignedOrder:
      type: object
      required:
        - marketId
        - side
        - type
        - baseToken
        - quoteToken
        - amount
        - price
        - timeInForce
        - maxSlippageBps
        - owner
        - delegate
        - nonce
        - expiresAt
        - chainId
        - settlementContract
        - signature
      properties:
        marketId:
          type: string
          example: QI-QUAI
        side:
          $ref: "#/components/schemas/OrderSide"
        type:
          $ref: "#/components/schemas/OrderType"
        baseToken:
          type: string
          description: Mock token ID now; later token/adapter address. Native Qi requires a wrapper/adapter before real vault settlement.
          example: mock:QI
        quoteToken:
          type: string
          example: mock:QUAI
        amount:
          type: string
          pattern: "^[0-9]+$"
          description: Base amount in atomic units as a decimal string.
          example: "1000000000000000000"
        price:
          type: string
          pattern: "^[0-9]+$"
          description: Quote-per-base limit price in atomic units as a decimal string.
          example: "123000000000000000"
        timeInForce:
          $ref: "#/components/schemas/TimeInForce"
        maxSlippageBps:
          type: integer
          minimum: 0
          maximum: 10000
          description: Required slippage guard for market_ioc orders; normally 0 for strict limit orders.
        owner:
          type: string
          description: Main wallet that owns funds and retains withdrawal authority.
          example: "0x1111111111111111111111111111111111111111"
        delegate:
          type: string
          description: Optional trade delegate; delegates default to NO_WITHDRAW and cannot withdraw funds.
          example: "0x0000000000000000000000000000000000000000"
        nonce:
          type: string
          pattern: "^[0-9]+$"
          description: Owner/delegate replay-protection nonce.
          example: "1"
        expiresAt:
          type: integer
          format: int64
          minimum: 0
        chainId:
          type: integer
          minimum: 0
          description: Quai replay domain; mock/dev may use 0 until real chain ID is pinned.
        settlementContract:
          type: string
          description: Settlement contract address included in the signature domain.
          example: "0x2222222222222222222222222222222222222222"
        clientOrderId:
          type: string
          description: Optional client/bot correlation ID.
        signature:
          $ref: "#/components/schemas/OrderSignature"
    OrderRequest:
      type: object
      required: [order]
      properties:
        order:
          $ref: "#/components/schemas/SignedOrder"
    OrderStatus:
      type: string
      enum: [accepted, open, partially_filled, filled, cancelled, expired, rejected]
    OrderAccepted:
      type: object
      required: [orderHash, status, filledAmount, remainingAmount]
      properties:
        orderHash:
          type: string
          description: Deterministic hash of the canonical SignedOrder payload.
        status:
          $ref: "#/components/schemas/OrderStatus"
        filledAmount:
          type: string
          pattern: "^[0-9]+$"
          example: "0"
        remainingAmount:
          type: string
          pattern: "^[0-9]+$"
          example: "1000000000000000000"
        fills:
          type: array
          description: Public IndexedFillProjection rows projected from confirmed settlement events; empty while the order rests.
          items:
            $ref: "#/components/schemas/IndexedFillProjection"
        source:
          type: string
          enum: [mock-matching-engine]
        custody:
          type: string
          enum: [non-custodial-no-withdrawal-authority]
        settlement:
          type: string
          enum: [awaiting-cross, mock-settlement-confirmed]
    CancellationResult:
      type: object
      description: Matcher-local cancellation result; removes matcher-open quantity only and does not cancel on-chain NonceManager nonces.
      required: [cancelled, cancelledCount, cancelledOrders, source, custody, nonceManager, permissions, message]
      properties:
        cancelled:
          type: boolean
          description: True when at least one matcher-open order quantity was removed.
        cancelledCount:
          type: integer
          minimum: 0
        orderHash:
          type: string
          description: Present for DELETE /v1/orders/{orderHash}.
        cancelledOrders:
          type: array
          items:
            $ref: "#/components/schemas/CancelledOrder"
        filters:
          type: object
          description: Optional cancel-all filters applied by the mock matcher.
          properties:
            marketId:
              type: [string, "null"]
              example: QI-QUAI
            owner:
              type: [string, "null"]
              description: Owner-wallet filter; not withdrawal authority.
        source:
          type: string
          enum: [mock-matching-engine]
        custody:
          type: string
          enum: [non-custodial-no-withdrawal-authority]
        nonceManager:
          type: string
          enum: [matcher-local-cancel-only-on-chain-nonce-unchanged]
          description: Mock matcher cancellation only; does not cancel on-chain NonceManager nonces.
        permissions:
          type: array
          description: Cancellation scopes required; delegate scopes still include NO_WITHDRAW and NO_ADMIN.
          items:
            type: string
            enum: [CANCEL_ORDER, CANCEL_ALL, NO_WITHDRAW, NO_ADMIN]
        message:
          type: string
          example: Mock cancellation removes only matcher-open quantity and does not cancel the on-chain nonce; user nonce cancellation must be signed through NonceManager later.
    CancelledOrder:
      type: object
      description: Cancelled matcher-local order projection. NonceManager nonce cancellation is not implied.
      required: [orderHash, marketId, owner, side, type, amount, price, filledAmount, remainingAmount, status, custody, cancelledAmount, cancelReason, nonceCancellation]
      properties:
        orderHash: { type: string }
        marketId: { type: string, example: QI-QUAI }
        owner: { type: string }
        delegate: { type: string }
        side:
          $ref: "#/components/schemas/OrderSide"
        type:
          $ref: "#/components/schemas/OrderType"
        amount:
          type: string
          pattern: "^[0-9]+$"
        price:
          type: string
          pattern: "^[0-9]+$"
        filledAmount:
          type: string
          pattern: "^[0-9]+$"
        remainingAmount:
          type: string
          pattern: "^[0-9]+$"
        status:
          type: string
          enum: [cancelled]
        custody:
          type: string
          enum: [non-custodial-no-withdrawal-authority]
        cancelledAmount:
          type: string
          pattern: "^[0-9]+$"
        cancelReason:
          type: string
          enum: [cancel_order, cancel_all]
        nonceCancellation:
          type: string
          enum: [not-implied-matcher-local-only]
    CancellationError:
      type: object
      description: Matcher-local cancellation error; no matcher-open quantity was removed and no on-chain nonce state changed.
      required: [error, orderHash, source, custody, nonceManager, permissions, message]
      properties:
        error:
          type: string
          enum: [order_not_found, order_not_open]
        orderHash: { type: string }
        status:
          $ref: "#/components/schemas/OrderStatus"
        source:
          type: string
          enum: [mock-matching-engine]
        custody:
          type: string
          enum: [non-custodial-no-withdrawal-authority]
        nonceManager:
          type: string
          enum: [matcher-local-cancel-only-on-chain-nonce-unchanged]
          description: Mock matcher cancellation errors do not cancel on-chain NonceManager nonces.
        permissions:
          type: array
          description: Error responses still reflect the trade-only cancellation scope; NO_WITHDRAW and NO_ADMIN remain required.
          items:
            type: string
            enum: [CANCEL_ORDER, NO_WITHDRAW, NO_ADMIN]
        nonceCancellation:
          type: string
          enum: [not-implied-matcher-local-only]
          description: If a matching order row is returned elsewhere, nonce cancellation remains not-implied-matcher-local-only.
        message: { type: string }
    IndexedFillProjection:
      type: object
      description: Public indexed fill projection from confirmed settlement events; not matcher-local truth.
      required: [projectionType, fillId, tradeId, marketId, makerOrderHash, takerOrderHash, price, amount, settlementMode, settlementStatus, sourceEventId]
      properties:
        projectionType:
          type: string
          enum: [IndexedFillProjection]
        fillId: { type: string, example: fill-000001 }
        tradeId: { type: string, example: trade-000001 }
        marketId: { type: string, example: QI-QUAI }
        makerOrderHash: { type: string }
        takerOrderHash: { type: string }
        maker: { type: string }
        taker: { type: string }
        price:
          type: string
          pattern: "^[0-9]+$"
        amount:
          type: string
          pattern: "^[0-9]+$"
        makerFee:
          type: string
          pattern: "^[0-9]+$"
        takerFee:
          type: string
          pattern: "^[0-9]+$"
        settlementMode:
          type: string
          enum: [mock, quai_contract]
        settlementStatus:
          type: string
          enum: [confirmed]
          description: Public fills are projected only after mock or contract settlement confirmation.
        sourceEventId:
          type: string
          description: Identifier of the source settlement event that produced this fill projection.
          example: event-000001
    FillListResponse:
      type: object
      description: Private fill list from the in-memory indexer projection.
      required: [source, fills]
      properties:
        source:
          type: string
          enum: [in-memory-indexer-projection]
        fills:
          type: array
          items:
            $ref: "#/components/schemas/IndexedFillProjection"
    OwnerSignedNonceCancelRequest:
      type: object
      description: Prepare-only owner wallet signature payload for future NonceManager cancellation. It does not authorize wallet loading, transaction signing, RPC broadcast, or relayer submission.
      required: [action, owner, chainId, nonceManagerContract, expiresAt, signature]
      properties:
        action:
          type: string
          enum: [cancelNonce, cancelNonceRange]
        owner:
          type: string
          description: Main wallet that owns the nonce namespace; delegate/API keys cannot submit this flow by default.
          example: "0x1111111111111111111111111111111111111111"
        nonce:
          type: [string, "null"]
          pattern: "^[0-9]+$"
          description: Decimal nonce for cancelNonce; null when nonceRange is used.
          example: "42"
        nonceRange:
          type: [object, "null"]
          description: Bounded range for cancelNonceRange; null for a single nonce.
          properties:
            from:
              type: string
              pattern: "^[0-9]+$"
            to:
              type: string
              pattern: "^[0-9]+$"
        chainId:
          type: integer
          minimum: 0
        nonceManagerContract:
          type: string
          description: NonceManager contract address in the replay domain.
        expiresAt:
          type: integer
          format: int64
          minimum: 0
        signature:
          type: string
          description: owner wallet signature over the nonce-cancel intent; not a delegate/API key credential.
    OwnerSignedNonceCancelNotImplemented:
      type: object
      description: Precise 501 placeholder for the future owner-signed NonceManager cancellation flow.
      required: [error, source, custody, nonceManager, permissions, message, realQuaiTransactions, walletRequired, approvalGate]
      properties:
        error:
          type: string
          enum: [owner_signed_nonce_cancel_not_implemented]
        source:
          type: string
          enum: [owner-signed-nonce-cancel-placeholder]
        custody:
          type: string
          enum: [non-custodial]
        nonceManager:
          type: string
          enum: [owner-signed-required]
        permissions:
          type: array
          items:
            type: string
            enum: [NO_WITHDRAW, NO_ADMIN]
        message:
          type: string
          example: Matcher-local cancellation does not mutate on-chain NonceManager nonces.
        realQuaiTransactions:
          type: boolean
          enum: [false]
        walletRequired:
          type: boolean
          enum: [false]
        approvalGate:
          type: string
          enum: [explicit-approval-required-before-wallet-signing-or-quai-broadcast]
    Market:
      type: object
      required: [id, base, quote, status]
      properties:
        id: { type: string, example: QI-QUAI }
        base: { type: string, example: QI }
        quote: { type: string, example: QUAI }
        status: { type: string, enum: [enabled, disabled] }
    TradeProofResponse:
      type: object
      required: [tradeId, proof, source, custody]
      properties:
        tradeId: { type: string }
        proof:
          $ref: "#/components/schemas/TradeProof"
        source:
          type: string
          enum: [proof-service-indexer-projection]
        custody:
          type: string
          enum: [non-custodial-no-withdrawal-authority]
    TradeProofNotFound:
      type: object
      required: [error, tradeId, proof, source, custody, message]
      properties:
        error:
          type: string
          enum: [proof_not_found]
        tradeId: { type: string }
        proof:
          type: "null"
        source:
          type: string
          enum: [proof-service-indexer-projection]
        custody:
          type: string
          enum: [non-custodial-no-withdrawal-authority]
        message: { type: string }
    TradeProof:
      type: object
      description: Mock proofs must keep settlementTx, blockNumber, blockHash, and explorerUrl null. Real Quai proofs require settlementTx, blockNumber, eventIndex, and explorerUrl.
      required:
        - tradeId
        - fillId
        - orderHashes
        - settlementMode
        - settlementTx
        - blockNumber
        - blockHash
        - eventIndex
        - market
        - price
        - amount
        - fees
        - explorerUrl
        - rawEvent
        - createdFromEventId
      properties:
        tradeId: { type: string }
        fillId: { type: string }
        orderHashes:
          type: array
          items: { type: string }
        settlementMode:
          type: string
          enum: [mock, quai_contract]
        mockSettlementReference:
          type: [string, "null"]
          description: Internal deterministic reference for mock settlement; not a Quai transaction hash.
        settlementTx:
          type: [string, "null"]
          description: Null for mock proofs; required transaction hash for quai_contract proofs.
        blockNumber:
          type: [integer, "null"]
          description: Null for mock proofs; required indexed block number for quai_contract proofs.
        blockHash:
          type: [string, "null"]
          description: Null for mock proofs; required for reorg-aware real Quai proofs.
        eventIndex:
          type: integer
        maker: { type: string }
        taker: { type: string }
        market: { type: string }
        price: { type: string }
        amount: { type: string }
        fees:
          type: object
          required: [maker, taker]
          properties:
            maker: { type: string }
            taker: { type: string }
        explorerUrl:
          type: [string, "null"]
          description: Null for mock proofs; required explorer link for quai_contract proofs.
        safetyNotice:
          type: string
          description: Mock proof copy must say no real Quai transaction, no explorer URL, and no funds moved.
        rawEvent:
          type: object
          additionalProperties: true
        createdFromEventId: { type: string }
