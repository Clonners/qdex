openapi: 3.1.0
info:
  title: Quai Terminal DEX API
  version: 0.0.0
  description: API-first non-custodial orderbook DEX for Quai.
servers:
  - url: http://localhost:8787
    description: local development
tags:
  - name: public
  - name: private
  - name: proofs
paths:
  /v1/health:
    get:
      tags: [public]
      summary: Health check
      responses:
        "200":
          description: Service is healthy
  /v1/markets:
    get:
      tags: [public]
      summary: List enabled markets
      responses:
        "200":
          description: Market list
  /v1/tickers:
    get:
      tags: [public]
      summary: List tickers
      responses:
        "200":
          description: Ticker list
  /v1/tickers/{market}:
    get:
      tags: [public]
      summary: Get ticker for a market
      parameters:
        - name: market
          in: path
          required: true
          schema: { type: string, example: QI-QUAI }
      responses:
        "200":
          description: Market ticker
  /v1/orderbook/{market}:
    get:
      tags: [public]
      summary: Get orderbook depth
      parameters:
        - name: market
          in: path
          required: true
          schema: { type: string, example: QI-QUAI }
      responses:
        "200":
          description: Orderbook depth
  /v1/trades/{market}:
    get:
      tags: [public]
      summary: Recent public trades
      parameters:
        - name: market
          in: path
          required: true
          schema: { type: string, example: QI-QUAI }
      responses:
        "200":
          description: Trade list
  /v1/klines/{market}:
    get:
      tags: [public]
      summary: Market candles
      parameters:
        - name: market
          in: path
          required: true
          schema: { type: string, example: QI-QUAI }
        - name: interval
          in: query
          required: false
          schema: { type: string, enum: [1m, 5m, 15m, 1h, 4h, 1d, 1w], default: 15m }
      responses:
        "200":
          description: Candle list
  /v1/fees:
    get:
      tags: [public]
      summary: Fee schedule
      responses:
        "200":
          description: Fee table
  /v1/contracts:
    get:
      tags: [public]
      summary: Contract addresses and verification links
      responses:
        "200":
          description: Contract registry
  /v1/auth/challenge:
    post:
      tags: [private]
      summary: Create wallet auth challenge
      responses:
        "200":
          description: Challenge payload to sign
  /v1/auth/session:
    post:
      tags: [private]
      summary: Exchange signed challenge for API session
      responses:
        "200":
          description: Session token
  /v1/account:
    get:
      tags: [private]
      summary: Current account profile
      responses:
        "200":
          description: Account data
  /v1/account/balances:
    get:
      tags: [private]
      summary: Indexed vault balances
      responses:
        "200":
          description: Balances
  /v1/orders:
    get:
      tags: [private]
      summary: List user orders
      responses:
        "200":
          description: Order list
    post:
      tags: [private]
      summary: Submit signed order
      description: POST /v1/orders accepts SignedOrder-like payloads. Market orders must be modeled as IOC limit orders with slippage bounds.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderRequest"
      responses:
        "201":
          description: Order accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderAccepted"
  /v1/orders/{orderHash}:
    delete:
      tags: [private]
      summary: Cancel order
      parameters:
        - name: orderHash
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Cancel request accepted
  /v1/orders/cancel-all:
    post:
      tags: [private]
      summary: Cancel all orders for user/market
      responses:
        "200":
          description: Cancel-all accepted
  /v1/fills:
    get:
      tags: [private]
      summary: User fills
      responses:
        "200":
          description: Fill list
  /v1/delegate-keys:
    get:
      tags: [private]
      summary: List delegate/API keys
      responses:
        "200":
          description: Delegate key list
    post:
      tags: [private]
      summary: Create delegate/API key
      description: Delegate keys default to NO_WITHDRAW.
      responses:
        "201":
          description: Delegate key created
  /v1/delegate-keys/{keyId}:
    delete:
      tags: [private]
      summary: Revoke delegate/API key
      parameters:
        - name: keyId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Delegate key revoked
  /v1/proofs/trades/{tradeId}:
    get:
      tags: [proofs]
      summary: Get on-chain proof for a trade
      parameters:
        - name: tradeId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Trade proof
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TradeProofResponse"
        "404":
          description: Indexed proof not found yet
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TradeProofNotFound"
components:
  schemas:
    OrderSide:
      type: string
      enum: [buy, sell]
    OrderType:
      type: string
      description: market_ioc orders are IOC limit orders with signed slippage/price bounds.
      enum: [limit, market_ioc]
    TimeInForce:
      type: string
      enum: [GTC, IOC, FOK, POST_ONLY]
    OrderSignature:
      type: object
      required: [scheme, signer, value]
      properties:
        scheme:
          type: string
          enum: [mock, typed_data]
          description: MVP supports mock signatures; production should use Quai-compatible typed structured data.
        signer:
          type: string
          description: Owner or approved delegate signer address.
          example: "0x1111111111111111111111111111111111111111"
        value:
          type: string
          description: Signature bytes or mock signature marker.
          example: "0xmock-signature"
        signedAt:
          type: integer
          format: int64
          minimum: 0
    SignedOrder:
      type: object
      required:
        - marketId
        - side
        - type
        - baseToken
        - quoteToken
        - amount
        - price
        - timeInForce
        - maxSlippageBps
        - owner
        - delegate
        - nonce
        - expiresAt
        - chainId
        - settlementContract
        - signature
      properties:
        marketId:
          type: string
          example: QI-QUAI
        side:
          $ref: "#/components/schemas/OrderSide"
        type:
          $ref: "#/components/schemas/OrderType"
        baseToken:
          type: string
          description: Mock token ID now; later token/adapter address. Native Qi requires a wrapper/adapter before real vault settlement.
          example: mock:QI
        quoteToken:
          type: string
          example: mock:QUAI
        amount:
          type: string
          pattern: "^[0-9]+$"
          description: Base amount in atomic units as a decimal string.
          example: "1000000000000000000"
        price:
          type: string
          pattern: "^[0-9]+$"
          description: Quote-per-base limit price in atomic units as a decimal string.
          example: "123000000000000000"
        timeInForce:
          $ref: "#/components/schemas/TimeInForce"
        maxSlippageBps:
          type: integer
          minimum: 0
          maximum: 10000
          description: Required slippage guard for market_ioc orders; normally 0 for strict limit orders.
        owner:
          type: string
          description: Main wallet that owns funds and retains withdrawal authority.
          example: "0x1111111111111111111111111111111111111111"
        delegate:
          type: string
          description: Optional trade delegate; delegates default to NO_WITHDRAW and cannot withdraw funds.
          example: "0x0000000000000000000000000000000000000000"
        nonce:
          type: string
          pattern: "^[0-9]+$"
          description: Owner/delegate replay-protection nonce.
          example: "1"
        expiresAt:
          type: integer
          format: int64
          minimum: 0
        chainId:
          type: integer
          minimum: 0
          description: Quai replay domain; mock/dev may use 0 until real chain ID is pinned.
        settlementContract:
          type: string
          description: Settlement contract address included in the signature domain.
          example: "0x2222222222222222222222222222222222222222"
        clientOrderId:
          type: string
          description: Optional client/bot correlation ID.
        signature:
          $ref: "#/components/schemas/OrderSignature"
    OrderRequest:
      type: object
      required: [order]
      properties:
        order:
          $ref: "#/components/schemas/SignedOrder"
    OrderStatus:
      type: string
      enum: [accepted, open, partially_filled, filled, cancelled, expired, rejected]
    OrderAccepted:
      type: object
      required: [orderHash, status, filledAmount, remainingAmount]
      properties:
        orderHash:
          type: string
          description: Deterministic hash of the canonical SignedOrder payload.
        status:
          $ref: "#/components/schemas/OrderStatus"
        filledAmount:
          type: string
          pattern: "^[0-9]+$"
          example: "0"
        remainingAmount:
          type: string
          pattern: "^[0-9]+$"
          example: "1000000000000000000"
    FillPacket:
      type: object
      required: [fillId, marketId, makerOrderHash, takerOrderHash, price, amount, settlementMode, createdAt]
      properties:
        fillId: { type: string, example: fill-000001 }
        marketId: { type: string, example: QI-QUAI }
        makerOrderHash: { type: string }
        takerOrderHash: { type: string }
        maker: { type: string }
        taker: { type: string }
        price:
          type: string
          pattern: "^[0-9]+$"
        amount:
          type: string
          pattern: "^[0-9]+$"
        makerFee:
          type: string
          pattern: "^[0-9]+$"
        takerFee:
          type: string
          pattern: "^[0-9]+$"
        settlementMode:
          type: string
          enum: [mock, quai_contract]
        createdAt:
          type: integer
          format: int64
    Market:
      type: object
      required: [id, base, quote, status]
      properties:
        id: { type: string, example: QI-QUAI }
        base: { type: string, example: QI }
        quote: { type: string, example: QUAI }
        status: { type: string, enum: [enabled, disabled] }
    TradeProofResponse:
      type: object
      required: [tradeId, proof, source, custody]
      properties:
        tradeId: { type: string }
        proof:
          $ref: "#/components/schemas/TradeProof"
        source:
          type: string
          enum: [proof-service-indexer-projection]
        custody:
          type: string
          enum: [non-custodial-no-withdrawal-authority]
    TradeProofNotFound:
      type: object
      required: [error, tradeId, proof, source, custody, message]
      properties:
        error:
          type: string
          enum: [proof_not_found]
        tradeId: { type: string }
        proof:
          type: "null"
        source:
          type: string
          enum: [proof-service-indexer-projection]
        custody:
          type: string
          enum: [non-custodial-no-withdrawal-authority]
        message: { type: string }
    TradeProof:
      type: object
      description: Mock proofs must keep settlementTx, blockNumber, blockHash, and explorerUrl null. Real Quai proofs require settlementTx, blockNumber, eventIndex, and explorerUrl.
      required:
        - tradeId
        - fillId
        - orderHashes
        - settlementMode
        - settlementTx
        - blockNumber
        - blockHash
        - eventIndex
        - market
        - price
        - amount
        - fees
        - explorerUrl
        - rawEvent
        - createdFromEventId
      properties:
        tradeId: { type: string }
        fillId: { type: string }
        orderHashes:
          type: array
          items: { type: string }
        settlementMode:
          type: string
          enum: [mock, quai_contract]
        mockSettlementReference:
          type: [string, "null"]
          description: Internal deterministic reference for mock settlement; not a Quai transaction hash.
        settlementTx:
          type: [string, "null"]
          description: Null for mock proofs; required transaction hash for quai_contract proofs.
        blockNumber:
          type: [integer, "null"]
          description: Null for mock proofs; required indexed block number for quai_contract proofs.
        blockHash:
          type: [string, "null"]
          description: Null for mock proofs; required for reorg-aware real Quai proofs.
        eventIndex:
          type: integer
        maker: { type: string }
        taker: { type: string }
        market: { type: string }
        price: { type: string }
        amount: { type: string }
        fees:
          type: object
          required: [maker, taker]
          properties:
            maker: { type: string }
            taker: { type: string }
        explorerUrl:
          type: [string, "null"]
          description: Null for mock proofs; required explorer link for quai_contract proofs.
        safetyNotice:
          type: string
          description: Mock proof copy must say no real Quai transaction, no explorer URL, and no funds moved.
        rawEvent:
          type: object
          additionalProperties: true
        createdFromEventId: { type: string }
