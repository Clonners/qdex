          $ref: "#/components/schemas/ListingRequestPrepare"
        marketRegistry:
          $ref: "#/components/schemas/MarketRegistrySafety"
        marketRegistryMutation: { type: boolean, enum: [false] }
        realQuaiTransactions: { type: boolean, enum: [false] }
        walletRequired: { type: boolean, enum: [false] }
        permissions:
          type: array
          items:
