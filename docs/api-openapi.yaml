    TokenListingAuthority:
      type: object
      description: Local-only listing authority metadata. The initial authority is Clonners-managed and can be handed to DAO governance through a two-step MarketRegistry authority transfer without custody power.
      required: [currentPhase, initialAuthority, futureAuthority, handoffPattern, authorityCan, authorityCannot, daoMigration, safety]
      properties:
        currentPhase:
          type: string
          enum: [clonners-operator-managed]
        initialAuthority:
          type: string
          example: Clonners-controlled MarketRegistry authority
        futureAuthority:
          type: string
          enum: [dao-governance]
        handoffPattern:
          type: string
          example: MarketRegistry.proposeMarketAuthority -> MarketRegistry.acceptMarketAuthority
        authorityCan:
          type: array
          items:
            type: string
            enum: [addMarket, disableMarket, proposeMarketAuthority]
        authorityCannot:
          type: array
          items:
            type: string
            enum: [moveTradingVaultBalances, withdrawUserFunds, grantDelegateAdmin, loadWallets, broadcastTransactions]
        daoMigration:
          type: object
          required: [status, acceptanceRequired, eventTruth]
          properties:
            status:
